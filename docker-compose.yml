services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atendeai-postgres
    environment:
      POSTGRES_DB: atendeai
      POSTGRES_USER: atendeai
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atendeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: atendeai-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/atendeai
      DB_USER: atendeai
      DB_PASSWORD: secret
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    profiles:
      - full  # só sobe com: docker compose --profile full up

volumes:
  postgres_data:
