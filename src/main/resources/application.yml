spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/atendeai}
    username: ${DB_USER:atendeai}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway controla o schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24h
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7d

  claude:
    api-key: ${ANTHROPIC_API_KEY}
    base-url: https://api.anthropic.com
    model: ${CLAUDE_MODEL:claude-3-5-haiku-20241022}
    max-tokens: 1024
    system-prompt: |
      Você é um assistente de atendimento inteligente. Seu papel é:
      1. Entender o problema ou necessidade do cliente
      2. Consultar a base de conhecimento disponível
      3. Oferecer soluções ou agendar um atendimento
      4. Ser cordial, objetivo e eficiente
      Responda sempre em português brasileiro.

logging:
  level:
    com.atendeai: DEBUG
    org.springframework.security: INFO
